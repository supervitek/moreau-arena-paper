<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidal Clock — The Island — Moreau Arena</title>
    <meta property="og:title" content="Tidal Clock — The Island">
    <meta property="og:description" content="The island breathes. Watch the tides.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --bg-primary: #050a10;
            --bg-secondary: #081018;
            --bg-card: #0d1a28;
            --bg-card-hover: #122235;
            --border: #1a3040;
            --accent: #e63946;
            --text: #f1faee;
            --text-dim: #8fa8b8;
            --text-muted: #4a6070;
            --teal: #00b4d8;
            --deep-blue: #1a5276;
            --amber: #c49a3c;
            --green: #4ecca3;
            --purple: #9b59b6;
            --gold: #d4a017;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(170deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #030810 100%);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Ocean particle background ── */
        .ocean-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .ocean-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: oceanFloat 8s ease-in-out infinite;
        }
        @keyframes oceanFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0.5); }
            30% { opacity: 0.4; }
            70% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
        }

        /* ── Nav ── */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(5,10,16,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .top-nav a:hover { color: var(--teal); }
        .nav-title {
            font-weight: 700;
            color: var(--teal);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        /* ── Page layout ── */
        .tide-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem 6rem;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .page-header .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* ── Storm banner ── */
        .storm-banner {
            background: linear-gradient(90deg, rgba(255,68,68,0.15), rgba(255,68,68,0.05));
            border: 1px solid rgba(255,68,68,0.3);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #ff6666;
            font-size: 0.85rem;
            animation: stormPulse 2s ease-in-out infinite;
            display: none;
        }
        @keyframes stormPulse {
            0%,100% { border-color: rgba(255,68,68,0.3); }
            50% { border-color: rgba(255,68,68,0.6); }
        }

        /* ── Circular Clock ── */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .tide-clock {
            width: 280px;
            height: 280px;
            position: relative;
        }

        .tide-clock svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .clock-phase-icon { font-size: 2.5rem; display: block; margin-bottom: 0.25rem; }
        .clock-phase-name {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .clock-countdown {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text-dim);
            margin-top: 0.15rem;
        }

        .clock-labels {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .clock-label {
            position: absolute;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .clock-label.active { color: var(--text); font-weight: 600; }

        /* ── Phase description card ── */
        .phase-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
            transition: border-color 0.5s;
        }
        .phase-card .effects-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }
        .phase-effects {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .effect-tag {
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
        }
        .effect-tag.positive { border-color: rgba(78,204,163,0.4); color: var(--green); }
        .effect-tag.negative { border-color: rgba(230,57,70,0.4); color: var(--accent); }
        .effect-tag.neutral { border-color: rgba(143,168,184,0.3); color: var(--text-dim); }
        .effect-tag.locked { border-color: rgba(230,57,70,0.3); color: #ff6666; }

        /* ── Schedule ── */
        .schedule-section {
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .schedule-grid {
            display: grid;
            gap: 0.4rem;
        }
        .schedule-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        .schedule-item.current {
            background: var(--bg-card);
            border-color: var(--teal);
            box-shadow: 0 0 12px rgba(0,180,216,0.15);
        }
        .schedule-time { color: var(--text-dim); width: 110px; flex-shrink: 0; }
        .schedule-icon { font-size: 1rem; }
        .schedule-name { font-weight: 500; }

        /* ── Content Zones ── */
        .zone-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .zone-tab {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .zone-tab:hover { border-color: var(--teal); color: var(--text); }
        .zone-tab.active {
            background: var(--bg-card);
            border-color: var(--teal);
            color: var(--teal);
        }
        .zone-tab.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .zone-tab .lock-icon { margin-right: 0.25rem; font-size: 0.7rem; }

        .zone-content { display: none; }
        .zone-content.active { display: block; }

        /* ── Bone Flats ── */
        .bone-flats {
            background: linear-gradient(135deg, rgba(196,154,60,0.08), rgba(196,154,60,0.02));
            border: 1px solid rgba(196,154,60,0.2);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .bone-flats .zone-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .bone-flats .zone-header h3 { font-size: 1.1rem; color: var(--amber); }
        .bone-flats .zone-header .zone-desc { font-size: 0.8rem; color: var(--text-dim); }
        .scavenge-limit {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .remains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .remain-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(196,154,60,0.15);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .remain-card:hover {
            border-color: var(--amber);
            box-shadow: 0 0 16px rgba(196,154,60,0.15);
            transform: translateY(-2px);
        }
        .remain-card.scavenged {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }
        .remain-card .remain-icon { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; }
        .remain-card .remain-name { font-size: 0.85rem; margin-bottom: 0.25rem; }
        .remain-card .remain-desc { font-size: 0.7rem; color: var(--text-dim); }

        /* ── Dreaming Pools ── */
        .dreaming-pools {
            background: linear-gradient(135deg, rgba(0,180,216,0.08), rgba(26,82,118,0.05));
            border: 1px solid rgba(0,180,216,0.2);
            border-radius: var(--radius);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .dreaming-pools .zone-header h3 { color: var(--teal); }
        .dreaming-pools::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 70%, rgba(0,180,216,0.06) 0%, transparent 60%),
                        radial-gradient(circle at 70% 30%, rgba(100,200,255,0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        .bioluminescent {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(0,220,255,0.6);
            animation: bioGlow 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes bioGlow {
            0%,100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .heal-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .heal-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,180,216,0.2);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .heal-btn:hover {
            border-color: var(--teal);
            box-shadow: 0 0 16px rgba(0,180,216,0.2);
            transform: translateY(-2px);
        }
        .heal-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .heal-btn .heal-icon { font-size: 1.3rem; display: block; margin-bottom: 0.4rem; }
        .heal-btn .heal-name { font-weight: 600; display: block; margin-bottom: 0.2rem; }
        .heal-btn .heal-desc { font-size: 0.7rem; color: var(--text-dim); }

        /* ── Driftwood Market ── */
        .driftwood-market {
            background: linear-gradient(135deg, rgba(78,204,163,0.08), rgba(30,80,60,0.05));
            border: 1px solid rgba(78,204,163,0.2);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .driftwood-market .zone-header h3 { color: var(--green); }

        .transfer-flow {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }
        .transfer-step {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(78,204,163,0.15);
            border-radius: 6px;
            padding: 1rem;
        }
        .transfer-step label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }
        .transfer-step select {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .transfer-step select option { background: #0d1a28; }

        .transfer-btn {
            background: rgba(78,204,163,0.15);
            border: 1px solid rgba(78,204,163,0.3);
            color: var(--green);
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .transfer-btn:hover {
            background: rgba(78,204,163,0.25);
            box-shadow: 0 0 16px rgba(78,204,163,0.2);
        }
        .transfer-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── Locked zone overlay ── */
        .zone-locked-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .zone-locked-msg .lock-big { font-size: 2.5rem; display: block; margin-bottom: 1rem; opacity: 0.4; }
        .zone-locked-msg .lock-text { font-size: 0.9rem; }
        .zone-locked-msg .lock-timer { color: var(--text-dim); font-size: 1.2rem; margin-top: 0.5rem; font-weight: 300; }

        /* ── Result toast ── */
        .tide-toast {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1.5rem;
            z-index: 1000;
            font-size: 0.85rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
            text-align: center;
            max-width: 350px;
        }
        .tide-toast.show { transform: translateX(-50%) translateY(0); }
        .tide-toast.success { border-color: rgba(78,204,163,0.4); }
        .tide-toast.danger { border-color: rgba(230,57,70,0.4); }

        /* ── Pet selector ── */
        .pet-select {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .pet-select-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .pet-select-btn:hover { border-color: var(--teal); color: var(--text); }
        .pet-select-btn.selected { border-color: var(--teal); color: var(--teal); background: rgba(0,180,216,0.1); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .tide-clock { width: 240px; height: 240px; }
            .clock-phase-icon { font-size: 2rem; }
            .clock-countdown { font-size: 1.1rem; }
            .schedule-time { width: 90px; }
            .heal-options { grid-template-columns: 1fr; }
            .remains-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Ocean Particles -->
    <div class="ocean-particles" id="oceanParticles"></div>

    <!-- Nav -->
    <nav class="top-nav">
        <a href="/island/home" style="display:flex;align-items:center;gap:0.5rem;">
            <span style="font-size:1.1rem;">&#127754;</span>
            <span class="nav-title">TIDAL CLOCK</span>
        </a>
        <div style="display:flex;gap:1rem;align-items:center;">
            <a href="/island/home">Dashboard</a>
            <a href="/island/kennel">Kennel</a>
        </div>
    </nav>

    <div class="tide-page">
        <!-- Storm Banner -->
        <div class="storm-banner" id="stormBanner">
            &#9889; <strong>STORM DETECTED</strong> — Time anomaly triggered a storm surge. Your most mutated pet gained +5 instability.
        </div>

        <!-- Header -->
        <div class="page-header">
            <h1>&#127754; The Tidal Clock</h1>
            <div class="subtitle">The island breathes on a 6-hour cycle. You cannot do everything at once.</div>
        </div>

        <!-- Circular Clock -->
        <div class="clock-container">
            <div class="tide-clock" id="tideClock">
                <svg viewBox="0 0 200 200" id="clockSvg"></svg>
                <div class="clock-center" id="clockCenter"></div>
                <div class="clock-labels" id="clockLabels"></div>
            </div>
        </div>

        <!-- Phase description -->
        <div class="phase-card" id="phaseCard"></div>

        <!-- Zone Tabs -->
        <div class="zone-tabs" id="zoneTabs"></div>

        <!-- Zone Content -->
        <div id="zoneContent"></div>

        <!-- Schedule -->
        <div class="schedule-section">
            <div class="section-title">24-Hour Tide Schedule</div>
            <div class="schedule-grid" id="scheduleGrid"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="tide-toast" id="tideToast"></div>

    <!-- Tide Wave -->
    <div id="tideWaveContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/island/supabase-client.js"></script>
    <script src="/static/island/storage.js"></script>
    <script src="/static/island/ui.js"></script>
    <script src="/static/island/tide-engine.js"></script>
    <script>
    (function() {
        'use strict';

        var EMOJI_MAP = {wolf:'\u{1F43A}',bear:'\u{1F43B}',fox:'\u{1F98A}',hawk:'\u{1F985}',snake:'\u{1F40D}',panther:'\u{1F406}',shark:'\u{1F988}',eagle:'\u{1F985}',tiger:'\u{1F405}',croc:'\u{1F40A}',rhino:'\u{1F98F}',mantis:'\u{1F997}',scorpion:'\u{1F982}',chameleon:'\u{1F98E}'};
        var STAT_NAMES = ['hp','atk','spd','wil'];

        var allPets = [];
        allPets = MoreauStorage.loadPets();
        var activePetIndex = MoreauStorage.getActivePetIndex(allPets);
        var selectedPetIndex = activePetIndex;

        // ── Ocean particles ──
        (function() {
            var container = document.getElementById('oceanParticles');
            for (var i = 0; i < 20; i++) {
                var dot = document.createElement('div');
                dot.className = 'ocean-particle';
                var size = 2 + Math.random() * 4;
                var s = TideEngine.getTideState();
                dot.style.cssText = 'width:' + size + 'px;height:' + size + 'px;' +
                    'left:' + (Math.random()*100) + '%;' +
                    'background:' + s.phaseColor + ';' +
                    'animation-delay:' + (Math.random()*8) + 's;' +
                    'animation-duration:' + (6+Math.random()*6) + 's;';
                container.appendChild(dot);
            }
        })();

        // ── Render circular clock ──
        function renderClock() {
            var s = TideEngine.getTideState();
            var svg = document.getElementById('clockSvg');
            var cx = 100, cy = 100, r = 85, strokeW = 16;

            var html = '';
            // Background ring
            html += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#0d1a28" stroke-width="'+strokeW+'"/>';

            // Phase arcs
            var phases = TideEngine.PHASES;
            for (var i = 0; i < 4; i++) {
                var startAngle = (i / 4) * 360;
                var endAngle = ((i + 1) / 4) * 360;
                var isCurrent = (i === s.phaseIndex);
                var opacity = isCurrent ? 0.9 : 0.25;
                var sw = isCurrent ? strokeW + 2 : strokeW;

                var circumference = 2 * Math.PI * r;
                var arcLen = circumference / 4;
                var dashOffset = -circumference * (i / 4);

                html += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" ' +
                    'stroke="' + phases[i].color + '" stroke-width="'+sw+'" ' +
                    'stroke-dasharray="'+arcLen+' '+(circumference - arcLen)+'" ' +
                    'stroke-dashoffset="'+(-circumference * i / 4)+'" ' +
                    'opacity="'+opacity+'" ' +
                    'stroke-linecap="butt"/>';
            }

            // Position marker
            var angle = s.cycleProgress * 360 * (Math.PI / 180);
            var markerR = r;
            var mx = cx + markerR * Math.cos(angle);
            var my = cy + markerR * Math.sin(angle);
            html += '<circle cx="'+mx+'" cy="'+my+'" r="6" fill="'+s.phaseColor+'" stroke="#fff" stroke-width="2">';
            html += '<animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>';
            html += '</circle>';

            // Phase separator dots
            for (var j = 0; j < 4; j++) {
                var a2 = (j / 4) * 360 * (Math.PI / 180);
                var dx = cx + r * Math.cos(a2);
                var dy = cy + r * Math.sin(a2);
                html += '<circle cx="'+dx+'" cy="'+dy+'" r="3" fill="#1a3040" stroke="#2a4050" stroke-width="1"/>';
            }

            svg.innerHTML = html;

            // Center info
            var mins = s.minutesLeft;
            var timeStr = mins >= 60 ? Math.floor(mins/60) + 'h ' + (mins%60) + 'm' : mins + 'm';
            document.getElementById('clockCenter').innerHTML =
                '<span class="clock-phase-icon">' + s.phaseIcon + '</span>' +
                '<span class="clock-phase-name" style="color:'+s.phaseColor+';">' + s.phaseName + '</span>' +
                '<span class="clock-countdown">' + timeStr + '</span>';

            // Labels
            var labels = document.getElementById('clockLabels');
            var labelPositions = [
                { text: 'LOW', x: '85%', y: '50%', transform: 'translate(0,-50%)' },
                { text: 'RISING', x: '50%', y: '92%', transform: 'translate(-50%,0)' },
                { text: 'HIGH', x: '2%', y: '50%', transform: 'translate(0,-50%)' },
                { text: 'FALLING', x: '50%', y: '2%', transform: 'translate(-50%,0)' }
            ];
            var lhtml = '';
            for (var k = 0; k < 4; k++) {
                var lp = labelPositions[k];
                var isActive = (k === s.phaseIndex);
                lhtml += '<div class="clock-label' + (isActive ? ' active' : '') + '" style="' +
                    'left:'+lp.x+';top:'+lp.y+';transform:'+lp.transform+';">' +
                    TideEngine.PHASES[k].icon + ' ' + lp.text + '</div>';
            }
            labels.innerHTML = lhtml;

            // Storm banner
            if (s.storm) {
                document.getElementById('stormBanner').style.display = 'block';
            }
        }

        // ── Phase card ──
        function renderPhaseCard() {
            var s = TideEngine.getTideState();
            var card = document.getElementById('phaseCard');
            card.style.borderColor = s.phaseColor;

            var effects = [];
            if (s.phase === 'low') {
                effects = [
                    { text: 'Bone Flats OPEN', cls: 'positive' },
                    { text: 'Lab +10 instability', cls: 'negative' },
                    { text: 'Fights x1.5 damage', cls: 'neutral' },
                    { text: 'Dreaming Pools LOCKED', cls: 'locked' }
                ];
            } else if (s.phase === 'high') {
                effects = [
                    { text: 'Lab LOCKED', cls: 'locked' },
                    { text: 'Dreaming Pools OPEN', cls: 'positive' },
                    { text: 'Driftwood Market OPEN', cls: 'positive' },
                    { text: 'Bone Flats SUBMERGED', cls: 'locked' }
                ];
            } else {
                effects = [
                    { text: 'Normal conditions', cls: 'neutral' },
                    { text: 'All standard areas open', cls: 'neutral' }
                ];
            }

            var html = '<div class="effects-title">Current Effects</div><div class="phase-effects">';
            effects.forEach(function(e) {
                html += '<span class="effect-tag ' + e.cls + '">' + e.text + '</span>';
            });
            html += '</div>';
            card.innerHTML = html;
        }

        // ── Zone tabs ──
        function renderZoneTabs() {
            var s = TideEngine.getTideState();
            var tabs = document.getElementById('zoneTabs');

            var zones = [
                { id: 'bone', name: 'Bone Flats', icon: '\u{1F3DC}\uFE0F', need: 'low' },
                { id: 'pool', name: 'Dreaming Pools', icon: '\u2728', need: 'high' },
                { id: 'market', name: 'Driftwood Market', icon: '\u{1F6F6}', need: 'high' }
            ];

            var html = '';
            zones.forEach(function(z) {
                var locked = (s.phase !== z.need);
                html += '<button class="zone-tab' + (locked ? ' locked' : '') + '" ' +
                    'data-zone="' + z.id + '" ' +
                    (locked ? 'title="Available during ' + (z.need === 'low' ? 'Low Tide' : 'High Tide') + '"' : '') +
                    ' onclick="' + (locked ? '' : 'selectZone(\'' + z.id + '\')') + '">' +
                    (locked ? '<span class="lock-icon">&#128274;</span>' : '') +
                    z.icon + ' ' + z.name +
                '</button>';
            });
            tabs.innerHTML = html;

            // Auto-select first available zone
            if (s.phase === 'low') selectZone('bone');
            else if (s.phase === 'high') selectZone('pool');
            else renderLockedContent();
        }

        window.selectZone = function(zoneId) {
            var tabs = document.querySelectorAll('.zone-tab');
            tabs.forEach(function(t) {
                t.classList.toggle('active', t.getAttribute('data-zone') === zoneId);
            });

            var content = document.getElementById('zoneContent');
            if (zoneId === 'bone') renderBoneFlats(content);
            else if (zoneId === 'pool') renderDreamingPools(content);
            else if (zoneId === 'market') renderDriftwoodMarket(content);
        };

        function renderLockedContent() {
            var s = TideEngine.getTideState();
            var content = document.getElementById('zoneContent');

            // Calculate time until low tide and high tide
            var now = Date.now();
            var cycleMs = 6*60*60*1000;
            var phaseMs = 90*60*1000;

            function minsUntilPhase(targetPhaseIndex) {
                var cyclePos = now % cycleMs;
                var targetStart = targetPhaseIndex * phaseMs;
                var diff = targetStart - cyclePos;
                if (diff <= 0) diff += cycleMs;
                return Math.ceil(diff / 60000);
            }

            var minsToLow = (s.phase === 'low') ? 0 : minsUntilPhase(0);
            var minsToHigh = (s.phase === 'high') ? 0 : minsUntilPhase(2);

            var fmtTime = function(m) { return m >= 60 ? Math.floor(m/60)+'h '+m%60+'m' : m+'m'; };

            content.innerHTML =
                '<div class="zone-locked-msg">' +
                    '<span class="lock-big">&#127754;</span>' +
                    '<div class="lock-text">The tide is ' + s.phaseName.toLowerCase() + '. Exclusive zones are resting.</div>' +
                    '<div style="margin-top:1rem;display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;">' +
                        '<div style="text-align:center;"><div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Bone Flats in</div>' +
                            '<div class="lock-timer" style="color:var(--amber);">' + fmtTime(minsToLow) + '</div></div>' +
                        '<div style="text-align:center;"><div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Dreaming Pools in</div>' +
                            '<div class="lock-timer" style="color:var(--teal);">' + fmtTime(minsToHigh) + '</div></div>' +
                    '</div>' +
                '</div>';
        }

        // ── Bone Flats ──
        function renderBoneFlats(container) {
            var cycleKey = _getCycleKey();
            var scavengeData = {};
            try { scavengeData = JSON.parse(localStorage.getItem('moreau_bone_flats') || '{}'); } catch(e) {}
            if (scavengeData.cycle !== cycleKey) {
                scavengeData = { cycle: cycleKey, scavenged: [], count: 0 };
            }
            var scavengesLeft = 2 - scavengeData.count;

            var deadPets = allPets.filter(function(p) { return p.deceased || p.is_alive === false; });
            var remains = [];

            if (deadPets.length > 0) {
                deadPets.slice(0, 5).forEach(function(pet, i) {
                    var animal = (pet.animal || '').toLowerCase();
                    var emoji = EMOJI_MAP[animal] || '\u{1F480}';
                    remains.push({
                        id: 'dead_' + i,
                        icon: emoji,
                        name: (pet.name || 'Unknown') + "'s remains",
                        desc: 'A stat shard lingers. 15% curse risk.',
                        isDead: true,
                        hasCurseRisk: true
                    });
                });
            }

            // Pad with driftwood if fewer than 3
            var driftwoodNames = ['Barnacled Fragment', 'Polished Bone Shard', 'Tide-worn Relic', 'Salt-crusted Totem', 'Coral Whisper'];
            var needed = Math.max(0, 3 - remains.length);
            for (var d = 0; d < needed; d++) {
                remains.push({
                    id: 'drift_' + d,
                    icon: '\u{1FAB5}',
                    name: driftwoodNames[d % driftwoodNames.length],
                    desc: '+1 random stat. No curse risk.',
                    isDead: false,
                    hasCurseRisk: false
                });
            }

            // Render pet selector
            var petSelectorHtml = _renderPetSelector();

            var html = '<div class="bone-flats">' +
                '<div class="zone-header">' +
                    '<div><h3>\u{1F3DC}\uFE0F Bone Flats</h3>' +
                    '<div class="zone-desc">The retreating tide reveals what was buried. Scavenge at your own risk.</div></div>' +
                '</div>' +
                '<div class="scavenge-limit">Scavenges remaining this cycle: <strong style="color:' +
                    (scavengesLeft > 0 ? 'var(--amber)' : 'var(--accent)') + ';">' + scavengesLeft + ' / 2</strong></div>' +
                petSelectorHtml +
                '<div class="remains-grid">';

            remains.forEach(function(rem) {
                var isScavenged = scavengeData.scavenged.indexOf(rem.id) !== -1;
                html += '<div class="remain-card' + (isScavenged ? ' scavenged' : '') + '" ' +
                    (!isScavenged && scavengesLeft > 0 ? 'onclick="scavengeRemain(\'' + rem.id + '\',' + rem.hasCurseRisk + ')"' : '') + '>' +
                    '<span class="remain-icon">' + rem.icon + '</span>' +
                    '<div class="remain-name">' + rem.name + '</div>' +
                    '<div class="remain-desc">' + (isScavenged ? 'Scavenged' : rem.desc) + '</div>' +
                '</div>';
            });

            html += '</div></div>';
            container.innerHTML = html;
        }

        window.scavengeRemain = function(remainId, hasCurseRisk) {
            var pet = _getSelectedPet();
            if (!pet) { showToast('No pet selected!', 'danger'); return; }

            var cycleKey = _getCycleKey();
            var scavengeData = {};
            try { scavengeData = JSON.parse(localStorage.getItem('moreau_bone_flats') || '{}'); } catch(e) {}
            if (scavengeData.cycle !== cycleKey) scavengeData = { cycle: cycleKey, scavenged: [], count: 0 };
            if (scavengeData.count >= 2) { showToast('No scavenges left this cycle!', 'danger'); return; }
            if (scavengeData.scavenged.indexOf(remainId) !== -1) return;

            var stats = pet.base_stats || pet.stats || {};
            var gainStat = STAT_NAMES[Math.floor(Math.random() * STAT_NAMES.length)];
            stats[gainStat] = (stats[gainStat] || 0) + 1;
            var resultMsg = '+1 ' + gainStat.toUpperCase() + ' to ' + (pet.name || 'your pet') + '!';

            // Curse check (15%)
            if (hasCurseRisk && Math.random() < 0.15) {
                var curseStat = STAT_NAMES.filter(function(s) { return s !== gainStat; });
                var lossStat = curseStat[Math.floor(Math.random() * curseStat.length)];
                stats[lossStat] = Math.max(0, (stats[lossStat] || 0) - 1);
                resultMsg += ' \u{1F480} TIDE CURSE: -1 ' + lossStat.toUpperCase() + '!';
            }

            pet.base_stats = stats;
            scavengeData.scavenged.push(remainId);
            scavengeData.count++;
            MoreauStorage.savePets(allPets);
            localStorage.setItem('moreau_bone_flats', JSON.stringify(scavengeData));

            showToast(resultMsg, hasCurseRisk && resultMsg.indexOf('CURSE') !== -1 ? 'danger' : 'success');
            renderBoneFlats(document.getElementById('zoneContent'));
        };

        // ── Dreaming Pools ──
        function renderDreamingPools(container) {
            var cycleKey = _getCycleKey();
            var poolData = {};
            try { poolData = JSON.parse(localStorage.getItem('moreau_dreaming_pools') || '{}'); } catch(e) {}
            if (poolData.cycle !== cycleKey) poolData = { cycle: cycleKey, healed: false };
            var canHeal = !poolData.healed;

            var petSelectorHtml = _renderPetSelector();
            var pet = _getSelectedPet();
            var hasInstability = pet && (pet.instability || 0) > 0;
            var hasScars = pet && pet.scars && pet.scars.length > 0;
            var hasCorruption = pet && (pet.corruption || 0) > 0;

            // Bioluminescent particles
            var bioHtml = '';
            for (var b = 0; b < 12; b++) {
                bioHtml += '<div class="bioluminescent" style="left:' + (Math.random()*90+5) + '%;top:' +
                    (Math.random()*80+10) + '%;animation-delay:' + (Math.random()*3) + 's;animation-duration:' +
                    (2+Math.random()*3) + 's;"></div>';
            }

            var html = '<div class="dreaming-pools">' + bioHtml +
                '<div class="zone-header" style="position:relative;z-index:1;">' +
                    '<div><h3>\u2728 Dreaming Pools</h3>' +
                    '<div class="zone-desc" style="color:var(--text-dim);font-size:0.8rem;margin-top:0.25rem;">Bioluminescent waters heal what science cannot.</div></div>' +
                '</div>' +
                '<div style="position:relative;z-index:1;margin-top:0.75rem;">' +
                    '<div class="scavenge-limit">Healings remaining this cycle: <strong style="color:' +
                        (canHeal ? 'var(--teal)' : 'var(--accent)') + ';">' + (canHeal ? '1' : '0') + ' / 1</strong></div>' +
                    petSelectorHtml +
                    (!pet ? '<div style="text-align:center;color:var(--text-muted);padding:1rem;">No living pets to heal.</div>' :
                    '<div class="heal-options">' +
                        '<button class="heal-btn" ' + (!canHeal || !hasInstability ? 'disabled' : 'onclick="healPet(\'instability\')"') + '>' +
                            '<span class="heal-icon">\u{1F4A7}</span>' +
                            '<span class="heal-name">Calm Waters</span>' +
                            '<span class="heal-desc">Remove 10 instability' + (pet ? ' (current: ' + (pet.instability || 0) + ')' : '') + '</span>' +
                        '</button>' +
                        '<button class="heal-btn" ' + (!canHeal || !hasScars ? 'disabled' : 'onclick="healPet(\'scar\')"') + '>' +
                            '<span class="heal-icon">\u{1FA79}</span>' +
                            '<span class="heal-name">Deep Cleanse</span>' +
                            '<span class="heal-desc">Remove 1 scar' + (pet ? ' (scars: ' + (pet.scars ? pet.scars.length : 0) + ')' : '') + '</span>' +
                        '</button>' +
                        '<button class="heal-btn" ' + (!canHeal || !hasCorruption ? 'disabled' : 'onclick="healPet(\'corruption\')"') + '>' +
                            '<span class="heal-icon">\u{1F52E}</span>' +
                            '<span class="heal-name">Purifying Flow</span>' +
                            '<span class="heal-desc">Remove 5 corruption' + (pet ? ' (current: ' + (pet.corruption || 0) + ')' : '') + '</span>' +
                        '</button>' +
                    '</div>') +
                '</div></div>';

            container.innerHTML = html;
        }

        window.healPet = function(type) {
            var pet = _getSelectedPet();
            if (!pet) return;

            var cycleKey = _getCycleKey();
            var poolData = {};
            try { poolData = JSON.parse(localStorage.getItem('moreau_dreaming_pools') || '{}'); } catch(e) {}
            if (poolData.cycle !== cycleKey) poolData = { cycle: cycleKey, healed: false };
            if (poolData.healed) { showToast('Already healed this cycle!', 'danger'); return; }

            var msg = '';
            if (type === 'instability') {
                var old = pet.instability || 0;
                pet.instability = Math.max(0, old - 10);
                msg = 'Instability reduced: ' + old + ' \u2192 ' + pet.instability;
            } else if (type === 'scar') {
                if (pet.scars && pet.scars.length > 0) {
                    var removed = pet.scars.pop();
                    msg = 'Scar removed: ' + (removed.name || 'Unknown scar');
                }
            } else if (type === 'corruption') {
                var oldC = pet.corruption || 0;
                pet.corruption = Math.max(0, oldC - 5);
                msg = 'Corruption reduced: ' + oldC + ' \u2192 ' + pet.corruption;
            }

            poolData.healed = true;
            MoreauStorage.savePets(allPets);
            localStorage.setItem('moreau_dreaming_pools', JSON.stringify(poolData));
            showToast('\u2728 ' + msg, 'success');
            renderDreamingPools(document.getElementById('zoneContent'));
        };

        // ── Driftwood Market ──
        function renderDriftwoodMarket(container) {
            var cycleKey = _getCycleKey();
            var marketData = {};
            try { marketData = JSON.parse(localStorage.getItem('moreau_driftwood_market') || '{}'); } catch(e) {}
            if (marketData.cycle !== cycleKey) marketData = { cycle: cycleKey, transferred: false };
            var canTransfer = !marketData.transferred;

            var livingPets = allPets.filter(function(p) { return !p.deceased && p.is_alive !== false; });

            // Find pets with artifacts
            var petsWithArtifacts = livingPets.filter(function(p) {
                return p.artifacts && p.artifacts.length > 0;
            });

            var html = '<div class="driftwood-market">' +
                '<div class="zone-header">' +
                    '<div><h3>\u{1F6F6} Driftwood Market</h3>' +
                    '<div class="zone-desc" style="color:var(--text-dim);font-size:0.8rem;margin-top:0.25rem;">The tide brings traders. Move artifacts between your pets — free of charge.</div></div>' +
                '</div>' +
                '<div class="scavenge-limit" style="margin-top:0.75rem;">Transfers remaining this cycle: <strong style="color:' +
                    (canTransfer ? 'var(--green)' : 'var(--accent)') + ';">' + (canTransfer ? '1' : '0') + ' / 1</strong></div>';

            if (petsWithArtifacts.length === 0) {
                html += '<div style="text-align:center;color:var(--text-muted);padding:2rem 1rem;">' +
                    'No pets have artifacts to trade. Visit the Shrine to acquire some.</div>';
            } else if (livingPets.length < 2) {
                html += '<div style="text-align:center;color:var(--text-muted);padding:2rem 1rem;">' +
                    'Need at least 2 living pets to transfer artifacts.</div>';
            } else {
                html += '<div class="transfer-flow">' +
                    '<div class="transfer-step">' +
                        '<label>Source Pet</label>' +
                        '<select id="marketSource" onchange="updateMarketArtifacts()">' +
                            '<option value="">Select pet...</option>';
                petsWithArtifacts.forEach(function(p) {
                    var idx = allPets.indexOf(p);
                    var animal = (p.animal || '').toLowerCase();
                    var emoji = EMOJI_MAP[animal] || '\u{1F43E}';
                    html += '<option value="' + idx + '">' + emoji + ' ' + (p.name || 'Pet') + ' (' + p.artifacts.length + ' artifacts)</option>';
                });
                html += '</select></div>' +
                    '<div class="transfer-step">' +
                        '<label>Artifact</label>' +
                        '<select id="marketArtifact"><option value="">Select artifact...</option></select>' +
                    '</div>' +
                    '<div class="transfer-step">' +
                        '<label>Destination Pet</label>' +
                        '<select id="marketDest">' +
                            '<option value="">Select pet...</option>';
                livingPets.forEach(function(p) {
                    var idx = allPets.indexOf(p);
                    var animal = (p.animal || '').toLowerCase();
                    var emoji = EMOJI_MAP[animal] || '\u{1F43E}';
                    html += '<option value="' + idx + '">' + emoji + ' ' + (p.name || 'Pet') + '</option>';
                });
                html += '</select></div>' +
                    '<button class="transfer-btn" ' + (!canTransfer ? 'disabled' : '') +
                        ' onclick="executeTransfer()">Transfer Artifact</button>' +
                '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        window.updateMarketArtifacts = function() {
            var srcIdx = parseInt(document.getElementById('marketSource').value, 10);
            var select = document.getElementById('marketArtifact');
            select.innerHTML = '<option value="">Select artifact...</option>';
            if (isNaN(srcIdx)) return;
            var pet = allPets[srcIdx];
            if (!pet || !pet.artifacts) return;
            pet.artifacts.forEach(function(art, i) {
                select.innerHTML += '<option value="' + i + '">' + (art.name || art) + '</option>';
            });
        };

        window.executeTransfer = function() {
            var srcIdx = parseInt(document.getElementById('marketSource').value, 10);
            var artIdx = parseInt(document.getElementById('marketArtifact').value, 10);
            var destIdx = parseInt(document.getElementById('marketDest').value, 10);

            if (isNaN(srcIdx) || isNaN(artIdx) || isNaN(destIdx)) {
                showToast('Select all fields!', 'danger'); return;
            }
            if (srcIdx === destIdx) {
                showToast('Source and destination must differ!', 'danger'); return;
            }

            var cycleKey = _getCycleKey();
            var marketData = {};
            try { marketData = JSON.parse(localStorage.getItem('moreau_driftwood_market') || '{}'); } catch(e) {}
            if (marketData.cycle !== cycleKey) marketData = { cycle: cycleKey, transferred: false };
            if (marketData.transferred) { showToast('Already transferred this cycle!', 'danger'); return; }

            var srcPet = allPets[srcIdx];
            var destPet = allPets[destIdx];
            if (!srcPet.artifacts || artIdx >= srcPet.artifacts.length) return;

            var artifact = srcPet.artifacts.splice(artIdx, 1)[0];
            if (!destPet.artifacts) destPet.artifacts = [];
            destPet.artifacts.push(artifact);

            marketData.transferred = true;
            MoreauStorage.savePets(allPets);
            localStorage.setItem('moreau_driftwood_market', JSON.stringify(marketData));
            showToast('\u{1F6F6} Transferred ' + (artifact.name || artifact) + ' to ' + (destPet.name || 'pet') + '!', 'success');
            renderDriftwoodMarket(document.getElementById('zoneContent'));
        };

        // ── Schedule ──
        function renderSchedule() {
            var schedule = TideEngine.getTideSchedule(24);
            var grid = document.getElementById('scheduleGrid');
            var now = Date.now();
            var html = '';

            schedule.forEach(function(entry) {
                var isCurrent = (now >= entry.start.getTime() && now < entry.end.getTime());
                var startStr = _fmtTime(entry.start);
                var endStr = _fmtTime(entry.end);

                html += '<div class="schedule-item' + (isCurrent ? ' current' : '') + '">' +
                    '<span class="schedule-time">' + startStr + ' - ' + endStr + '</span>' +
                    '<span class="schedule-icon">' + entry.phaseIcon + '</span>' +
                    '<span class="schedule-name">' + entry.phaseName + '</span>' +
                    (isCurrent ? '<span style="margin-left:auto;font-size:0.7rem;color:var(--teal);">NOW</span>' : '') +
                '</div>';
            });
            grid.innerHTML = html;
        }

        // ── Helpers ──
        function _getCycleKey() {
            var cycleMs = 6*60*60*1000;
            return 'cycle_' + Math.floor(Date.now() / cycleMs);
        }

        function _getSelectedPet() {
            var living = allPets.filter(function(p) { return !p.deceased && p.is_alive !== false; });
            if (living.length === 0) return null;
            var pet = allPets[selectedPetIndex];
            if (!pet || pet.deceased || pet.is_alive === false) {
                // Fall back to first living
                for (var i = 0; i < allPets.length; i++) {
                    if (!allPets[i].deceased && allPets[i].is_alive !== false) {
                        selectedPetIndex = i;
                        return allPets[i];
                    }
                }
                return null;
            }
            return pet;
        }

        function _renderPetSelector() {
            var living = allPets.filter(function(p) { return !p.deceased && p.is_alive !== false; });
            if (living.length <= 1) return '';

            var html = '<div class="pet-select">';
            allPets.forEach(function(pet, idx) {
                if (pet.deceased || pet.is_alive === false) return;
                var animal = (pet.animal || '').toLowerCase();
                var emoji = EMOJI_MAP[animal] || '\u{1F43E}';
                var isSelected = (idx === selectedPetIndex);
                html += '<button class="pet-select-btn' + (isSelected ? ' selected' : '') + '" ' +
                    'onclick="selectTidePet(' + idx + ')">' +
                    emoji + ' ' + (pet.name || 'Pet') + '</button>';
            });
            html += '</div>';
            return html;
        }

        window.selectTidePet = function(idx) {
            selectedPetIndex = idx;
            var s = TideEngine.getTideState();
            if (s.phase === 'low') renderBoneFlats(document.getElementById('zoneContent'));
            else if (s.phase === 'high') {
                var activeTab = document.querySelector('.zone-tab.active');
                var zone = activeTab ? activeTab.getAttribute('data-zone') : 'pool';
                selectZone(zone);
            }
        };

        function _fmtTime(d) {
            var h = d.getHours();
            var m = d.getMinutes();
            return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
        }

        function showToast(msg, type) {
            MoreauUI.showToast({
                id: 'tideToast',
                baseClass: 'tide-toast',
                type: type || '',
                html: msg,
                visibleClass: 'show',
                duration: 3500
            });
        }
        window.showToast = showToast;

        // ── Init ──
        renderClock();
        renderPhaseCard();
        renderZoneTabs();
        renderSchedule();
        TideEngine.renderTideWave('tideWaveContainer');

        // Refresh every 15 seconds
        setInterval(function() {
            renderClock();
            renderPhaseCard();
        }, 15000);

        // Full refresh every 60 seconds (catches phase transitions)
        setInterval(function() {
            renderZoneTabs();
            renderSchedule();
        }, 60000);

    })();
    </script>
</body>
</html>
