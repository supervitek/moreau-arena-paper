<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Dossier — Moreau Arena</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .dossier {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* ── Classified Header ── */
        .classified-header {
            border: 2px solid var(--accent);
            background: var(--bg-code);
            font-family: var(--font-mono);
            letter-spacing: 2px;
            padding: 1.5rem 2rem;
            text-align: center;
            position: relative;
            margin-bottom: 2rem;
        }

        .classified-header::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(230, 57, 70, 0.3);
            pointer-events: none;
        }

        .classified-title {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .classified-doc {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
        }

        .classified-clearance {
            font-size: 0.65rem;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .stamp-overlay {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.55rem;
            color: rgba(230, 57, 70, 0.4);
            transform: rotate(12deg);
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(230, 57, 70, 0.3);
            padding: 2px 6px;
        }

        /* ── Threat Level ── */
        .threat-level {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .threat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            margin-bottom: 0.5rem;
        }

        .threat-stars {
            font-size: 1.5rem;
            letter-spacing: 4px;
        }

        .star-filled { color: var(--accent); }
        .star-empty { color: var(--text-muted); }

        .threat-designation {
            font-size: 0.7rem;
            color: var(--accent);
            font-family: var(--font-mono);
            margin-top: 0.4rem;
            letter-spacing: 1px;
        }

        /* ── Section Headers ── */
        .section-header {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 2rem;
        }

        .section-header::before {
            content: '//';
            color: var(--accent);
            margin-right: 0.5rem;
        }

        /* ── Subject Section ── */
        .subject-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1.5rem;
            align-items: center;
        }

        .subject-emoji {
            font-size: 4rem;
            line-height: 1;
            background: var(--bg-code);
            border-radius: var(--radius);
            padding: 0.75rem;
            border: 1px solid var(--border);
        }

        .subject-info {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .subject-name {
            font-family: var(--font-mono);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subject-species {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .subject-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            width: fit-content;
        }

        .status-active { background: rgba(78,204,163,0.15); color: var(--green); }
        .status-mutating { background: rgba(212,160,23,0.15); color: var(--gold); }
        .status-dominant { background: rgba(230,57,70,0.15); color: var(--accent); }
        .status-legendary { background: rgba(147,112,219,0.15); color: #9370db; }
        .status-apex { background: rgba(230,57,70,0.25); color: #ff4d5a; border: 1px solid rgba(230,57,70,0.4); animation: apexPulse 2s ease-in-out infinite; }

        @keyframes apexPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(230,57,70,0.2); }
            50% { box-shadow: 0 0 16px rgba(230,57,70,0.5); }
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ── Stats Table ── */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .stats-table th {
            text-align: center;
            padding: 0.6rem 0.5rem;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            background: var(--bg-code);
        }

        .stats-table td {
            text-align: center;
            padding: 0.65rem 0.5rem;
            border-bottom: 1px solid rgba(42, 42, 58, 0.5);
            font-size: 0.85rem;
        }

        .stats-table tr:last-child td { border-bottom: none; }

        .stat-name { text-align: left !important; font-weight: 600; padding-left: 1rem !important; }
        .stat-bonus { color: var(--green); }
        .stat-bonus::before { content: '+'; }
        .stat-bonus.zero { color: var(--text-muted); }
        .stat-bonus.zero::before { content: ''; }
        .stat-derived { color: var(--text-dim); font-size: 0.8rem; }

        .row-hp .stat-name { color: var(--green); }
        .row-atk .stat-name { color: var(--accent); }
        .row-spd .stat-name { color: var(--blue); }
        .row-wil .stat-name { color: #9b59b6; }

        .row-hp td { border-left: 3px solid var(--green); }
        .row-atk td:first-child { border-left: 3px solid var(--accent); }
        .row-spd td:first-child { border-left: 3px solid var(--blue); }
        .row-wil td:first-child { border-left: 3px solid #9b59b6; }
        .row-hp td:first-child { border-left: 3px solid var(--green); }

        /* ── Mutation Path Tree ── */
        .mutation-tree {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .tier-section {
            margin-bottom: 1.5rem;
        }

        .tier-section:last-child {
            margin-bottom: 0;
        }

        .tier-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.6rem;
        }

        .tier-nodes {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mut-node {
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: var(--font-mono);
            border: 1px solid var(--border);
            background: var(--bg-code);
            color: var(--text-muted);
            position: relative;
            transition: all 0.2s;
        }

        .mut-node.chosen {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212,160,23,0.1);
            box-shadow: 0 0 8px rgba(212,160,23,0.2);
        }

        .mut-node.unchosen {
            opacity: 0.35;
            text-decoration: line-through;
        }

        .mut-node.dimmed {
            opacity: 0.2;
            border-style: dashed;
        }

        .mut-node.destiny {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(230,57,70,0.1);
            box-shadow: 0 0 12px rgba(230,57,70,0.2);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .tier-connector {
            display: flex;
            align-items: center;
            padding: 0.25rem 0 0.25rem 2rem;
        }

        .connector-line {
            width: 2px;
            height: 16px;
            background: var(--border);
        }

        .connector-line.active {
            background: var(--gold);
            box-shadow: 0 0 4px rgba(212,160,23,0.3);
        }

        .connector-line.dimmed {
            background: var(--border);
            opacity: 0.3;
            border-left: 2px dashed var(--border);
            width: 0;
        }

        /* ── Combat Record ── */
        .combat-record {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .combat-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .combat-stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .combat-stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .winrate-bar-bg {
            height: 8px;
            background: rgba(230,57,70,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.3rem;
        }

        .winrate-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .winrate-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
            text-align: right;
        }

        .fight-list-compact {
            margin-top: 1rem;
        }

        .fight-compact {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.7rem;
            border-bottom: 1px solid rgba(42,42,58,0.3);
            font-size: 0.8rem;
        }

        .fight-compact:last-child { border-bottom: none; }

        .fight-compact .fc-result {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.7rem;
            width: 22px;
            text-align: center;
        }

        .fc-win { color: var(--green); }
        .fc-loss { color: var(--accent); }

        .fight-compact .fc-opponent {
            flex: 1;
            color: var(--text-dim);
        }

        .fight-compact .fc-ticks {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-family: var(--font-mono);
        }

        .no-fights {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: var(--font-mono);
            text-align: center;
            padding: 1.5rem;
        }

        /* ── Psychological Profile ── */
        .psych-profile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .psych-mood {
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .psych-mood-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .psych-soul-box {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            position: relative;
            overflow: hidden;
            transform: rotate(-0.3deg);
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-dim);
            min-height: 80px;
        }

        .psych-soul-box::before {
            content: 'CLASSIFIED';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 3rem;
            font-weight: 900;
            color: rgba(230, 57, 70, 0.06);
            letter-spacing: 10px;
            white-space: nowrap;
            pointer-events: none;
        }

        .psych-stamp {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 0.5rem;
            color: rgba(230, 57, 70, 0.35);
            font-family: var(--font-mono);
            font-weight: 700;
            transform: rotate(5deg);
            border: 1px solid rgba(230, 57, 70, 0.2);
            padding: 1px 5px;
        }

        .redacted-text {
            background: var(--text-muted);
            color: var(--text-muted);
            padding: 0 4px;
            border-radius: 2px;
            user-select: none;
        }

        .soul-cursor {
            display: inline-block;
            width: 7px;
            height: 1em;
            background: var(--text-dim);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── Bottom Buttons ── */
        .dossier-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .dossier-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .dossier-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            opacity: 1;
        }

        .btn-share {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-share:hover {
            background: rgba(78,204,163,0.1);
            border-color: var(--green);
            color: var(--green);
        }

        .btn-share.copied {
            background: rgba(78,204,163,0.2);
            color: var(--green);
        }

        .btn-back {
            border-color: var(--border);
            color: var(--text-dim);
        }

        .btn-back:hover {
            border-color: var(--text-dim);
            color: var(--text);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .subject-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .subject-emoji { margin: 0 auto; }
            .subject-status { margin: 0 auto; }
            .combat-summary { grid-template-columns: 1fr; gap: 0.5rem; }
            .tier-nodes { flex-direction: column; }
            .dossier-actions { flex-direction: column; }
        }
    </style>
</head>

    <div class="dossier" id="dossier"></div>

    <script>
        const ANIMAL_EMOJIS = {
            bear: '\u{1F43B}', buffalo: '\u{1F9AC}', boar: '\u{1F417}', tiger: '\u{1F42F}',
            wolf: '\u{1F43A}', monkey: '\u{1F412}', porcupine: '\u{1F994}', scorpion: '\u{1F982}',
            vulture: '\u{1F985}', rhino: '\u{1F98F}', viper: '\u{1F40D}', fox: '\u{1F98A}',
            eagle: '\u{1F985}', panther: '\u{1F408}\u200D\u2B1B'
        };

        // Mutation tree data with stat_changes
        const MUTATION_TREE = {
            bloodrage: {
                name: 'Bloodrage', tier: 1,
                stat_changes: { atk: 3, hp: -1 },
                children: {
                    frenzy: {
                        name: 'Frenzy', tier: 2,
                        stat_changes: { atk: 4, spd: 2, hp: -2 },
                        children: {
                            berserker_mode: {
                                name: 'BERSERKER MODE', tier: 3,
                                stat_changes: { atk: 6, spd: 3, hp: -3, wil: -1 }
                            }
                        }
                    },
                    intimidate: {
                        name: 'Intimidate', tier: 2,
                        stat_changes: { atk: 2, wil: 3, hp: -1 },
                        children: {
                            warlord: {
                                name: 'WARLORD', tier: 3,
                                stat_changes: { atk: 4, wil: 5, spd: 1 }
                            }
                        }
                    }
                }
            },
            thick_hide: {
                name: 'Thick Hide', tier: 1,
                stat_changes: { hp: 3, wil: 1, spd: -1 },
                children: {
                    regeneration: {
                        name: 'Regeneration', tier: 2,
                        stat_changes: { hp: 5, wil: 2, spd: -2 },
                        children: {
                            immortal: {
                                name: 'IMMORTAL', tier: 3,
                                stat_changes: { hp: 8, wil: 3, atk: -2, spd: -3 }
                            }
                        }
                    },
                    fortress: {
                        name: 'Fortress', tier: 2,
                        stat_changes: { hp: 3, wil: 3, atk: 1, spd: -2 },
                        children: {
                            juggernaut: {
                                name: 'JUGGERNAUT', tier: 3,
                                stat_changes: { hp: 5, wil: 4, atk: 2, spd: -3 }
                            }
                        }
                    }
                }
            },
            quick_feet: {
                name: 'Quick Feet', tier: 1,
                stat_changes: { spd: 3, atk: 1, hp: -1 },
                children: {
                    ambush: {
                        name: 'Ambush', tier: 2,
                        stat_changes: { spd: 3, atk: 3, wil: -1 },
                        children: {
                            phantom_strike: {
                                name: 'PHANTOM STRIKE', tier: 3,
                                stat_changes: { spd: 5, atk: 5, hp: -2, wil: -2 }
                            }
                        }
                    },
                    evasion: {
                        name: 'Evasion', tier: 2,
                        stat_changes: { spd: 4, wil: 2, atk: -1 },
                        children: {
                            ghost: {
                                name: 'GHOST', tier: 3,
                                stat_changes: { spd: 7, wil: 3, atk: -2, hp: -1 }
                            }
                        }
                    }
                }
            }
        };

        // -- Multi-pet migration & loader --
        function migrateAndLoadPet() {
            // Migrate old single-pet format to multi-pet
            const oldRaw = localStorage.getItem('moreau_pet');
            if (oldRaw) {
                try {
                    const oldPet = JSON.parse(oldRaw);
                    const existing = JSON.parse(localStorage.getItem('moreau_pets') || '[]');
                    if (existing.length < 6) existing.push(oldPet);
                    localStorage.setItem('moreau_pets', JSON.stringify(existing));
                    localStorage.setItem('moreau_active_pet', String(existing.length - 1));
                    localStorage.removeItem('moreau_pet');
                } catch(e) { localStorage.removeItem('moreau_pet'); }
            }
            const pets = JSON.parse(localStorage.getItem('moreau_pets') || '[]');
            if (pets.length === 0) return null;
            let idx = parseInt(localStorage.getItem('moreau_active_pet') || '0', 10);
            if (idx < 0 || idx >= pets.length) idx = 0;
            return pets[idx];
        }
        function saveActivePet(pet) {
            const pets = JSON.parse(localStorage.getItem('moreau_pets') || '[]');
            let idx = parseInt(localStorage.getItem('moreau_active_pet') || '0', 10);
            if (idx < 0 || idx >= pets.length) idx = 0;
            pets[idx] = pet;
            localStorage.setItem('moreau_pets', JSON.stringify(pets));
        }

        // Load pet
        const pet = migrateAndLoadPet();
        if (!pet) { window.location.href = '/pets'; }

        function getStatus(level) {
            if (level >= 10) return { text: 'APEX PREDATOR', cls: 'status-apex' };
            if (level >= 9) return { text: 'Legendary', cls: 'status-legendary' };
            if (level >= 7) return { text: 'Dominant', cls: 'status-dominant' };
            if (level >= 4) return { text: 'Mutating', cls: 'status-mutating' };
            return { text: 'Active', cls: 'status-active' };
        }

        function getThreat(level) {
            if (level >= 10) return { stars: 5, label: 'MAXIMUM' };
            if (level >= 7) return { stars: 4, label: 'SEVERE' };
            if (level >= 4) return { stars: 3, label: 'ELEVATED' };
            return { stars: 1, label: 'LOW' };
        }

        function capitalize(s) {
            return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
        }

        // Calculate mutation stat bonuses
        function getMutationBonuses(mutations) {
            const bonuses = { hp: 0, atk: 0, spd: 0, wil: 0 };
            if (!mutations || !mutations.length) return bonuses;

            // Walk the mutation tree to sum stat_changes for chosen mutations
            for (const mutName of mutations) {
                const found = findMutationNode(mutName);
                if (found && found.stat_changes) {
                    for (const [stat, val] of Object.entries(found.stat_changes)) {
                        if (bonuses.hasOwnProperty(stat)) bonuses[stat] += val;
                    }
                }
            }
            return bonuses;
        }

        function findMutationNode(name) {
            const lower = name.toLowerCase().replace(/\s+/g, '_');
            for (const t1 of Object.values(MUTATION_TREE)) {
                if (t1.name.toLowerCase().replace(/\s+/g, '_') === lower) return t1;
                if (t1.children) {
                    for (const t2 of Object.values(t1.children)) {
                        if (t2.name.toLowerCase().replace(/\s+/g, '_') === lower) return t2;
                        if (t2.children) {
                            for (const t3 of Object.values(t2.children)) {
                                if (t3.name.toLowerCase().replace(/\s+/g, '_') === lower) return t3;
                            }
                        }
                    }
                }
            }
            return null;
        }

        // Find the active mutation path
        function getActivePath(mutations) {
            if (!mutations || !mutations.length) return { t1: null, t2: null, t3: null, t1key: null };
            const path = { t1: null, t2: null, t3: null, t1key: null };

            for (const mutName of mutations) {
                const lower = mutName.toLowerCase().replace(/\s+/g, '_');
                for (const [k1, t1] of Object.entries(MUTATION_TREE)) {
                    if (t1.name.toLowerCase().replace(/\s+/g, '_') === lower) {
                        path.t1 = t1.name;
                        path.t1key = k1;
                    }
                    if (t1.children) {
                        for (const [k2, t2] of Object.entries(t1.children)) {
                            if (t2.name.toLowerCase().replace(/\s+/g, '_') === lower) {
                                path.t2 = t2.name;
                                path.t1 = t1.name;
                                path.t1key = k1;
                            }
                            if (t2.children) {
                                for (const [k3, t3] of Object.entries(t2.children)) {
                                    if (t3.name.toLowerCase().replace(/\s+/g, '_') === lower) {
                                        path.t3 = t3.name;
                                        path.t2 = t2.name;
                                        path.t1 = t1.name;
                                        path.t1key = k1;
                                    }
                                }
                            }
                        }
                    }
                }
            }
            return path;
        }

        function renderDossier() {
            const el = document.getElementById('dossier');
            const level = pet.level || 1;
            const stats = pet.stats || {};
            const mutations = pet.mutations || [];
            const animal = (pet.animal || '').toLowerCase();
            const emoji = ANIMAL_EMOJIS[animal] || '\u{1F43E}';
            const status = getStatus(level);
            const threat = getThreat(level);
            const bonuses = getMutationBonuses(mutations);
            const docCode = 'MRU-PET-' + (pet.name || 'UNKN').substring(0, 4).toUpperCase() + '-' + level;
            const activePath = getActivePath(mutations);

            // Base stats (total minus bonuses)
            const baseHP = (stats.hp || 0) - bonuses.hp;
            const baseATK = (stats.atk || 0) - bonuses.atk;
            const baseSPD = (stats.spd || 0) - bonuses.spd;
            const baseWIL = (stats.wil || 0) - bonuses.wil;

            // Derived stats
            const maxHP = 50 + (stats.hp || 0) * 10;
            const baseDmg = (stats.atk || 0) - 1;
            const dodge = ((stats.spd || 0) * 2.5).toFixed(1);
            const resist = ((stats.wil || 0) * 3.3).toFixed(1);

            // Threat stars
            let starsHTML = '';
            for (let i = 0; i < 5; i++) {
                starsHTML += i < threat.stars
                    ? '<span class="star-filled">\u2605</span>'
                    : '<span class="star-empty">\u2605</span>';
            }

            // Fights
            const fights = pet.fights || [];
            const wins = fights.filter(f => f.result === 'win').length;
            const losses = fights.length - wins;
            const winRate = fights.length > 0 ? ((wins / fights.length) * 100).toFixed(1) : 0;
            const last5 = fights.slice(-5).reverse();

            let html = '';

            // Classified header
            html += `
            <div class="classified-header">
                <span class="stamp-overlay">TOP SECRET</span>
                <div class="classified-title">CLASSIFIED &mdash; ISLAND OF MOREAU &mdash; SUBJECT DOSSIER</div>
                <div class="classified-doc">Document: ${docCode}</div>
                <div class="classified-clearance">Clearance: ULTRAVIOLET</div>
            </div>`;

            // Threat Level
            html += `
            <div class="threat-level">
                <div class="threat-label">Threat Assessment</div>
                <div class="threat-stars">${starsHTML}</div>
                <div class="threat-designation">${threat.label}</div>
            </div>`;

            // Subject
            html += `<div class="section-header">Subject Identification</div>`;
            html += `
            <div class="subject-card">
                <div class="subject-emoji">${emoji}</div>
                <div class="subject-info">
                    <div class="subject-name">${pet.name || 'UNKNOWN'}</div>
                    <div class="subject-species">${emoji} ${capitalize(pet.animal || 'creature')}</div>
                    <div class="subject-status ${status.cls}"><span class="status-dot"></span>${status.text}</div>
                </div>
            </div>`;

            // Stats Table
            html += `<div class="section-header">Biometric Analysis</div>`;
            html += `
            <table class="stats-table">
                <thead>
                    <tr>
                        <th style="text-align:left;padding-left:1rem;">Stat</th>
                        <th>Base</th>
                        <th>Mutation</th>
                        <th>Effective</th>
                        <th>Derived</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="row-hp">
                        <td class="stat-name">HP</td>
                        <td>${baseHP}</td>
                        <td class="stat-bonus ${bonuses.hp === 0 ? 'zero' : ''}">${bonuses.hp === 0 ? '\u2014' : bonuses.hp}</td>
                        <td style="font-weight:700;">${stats.hp || 0}</td>
                        <td class="stat-derived">${maxHP} max HP</td>
                    </tr>
                    <tr class="row-atk">
                        <td class="stat-name">ATK</td>
                        <td>${baseATK}</td>
                        <td class="stat-bonus ${bonuses.atk === 0 ? 'zero' : ''}">${bonuses.atk === 0 ? '\u2014' : bonuses.atk}</td>
                        <td style="font-weight:700;">${stats.atk || 0}</td>
                        <td class="stat-derived">${baseDmg} base dmg</td>
                    </tr>
                    <tr class="row-spd">
                        <td class="stat-name">SPD</td>
                        <td>${baseSPD}</td>
                        <td class="stat-bonus ${bonuses.spd === 0 ? 'zero' : ''}">${bonuses.spd === 0 ? '\u2014' : bonuses.spd}</td>
                        <td style="font-weight:700;">${stats.spd || 0}</td>
                        <td class="stat-derived">${dodge}% dodge</td>
                    </tr>
                    <tr class="row-wil">
                        <td class="stat-name">WIL</td>
                        <td>${baseWIL}</td>
                        <td class="stat-bonus ${bonuses.wil === 0 ? 'zero' : ''}">${bonuses.wil === 0 ? '\u2014' : bonuses.wil}</td>
                        <td style="font-weight:700;">${stats.wil || 0}</td>
                        <td class="stat-derived">${resist}% resist</td>
                    </tr>
                </tbody>
            </table>`;

            // Mutation Path Visualization
            html += `<div class="section-header">Mutation Path</div>`;
            html += `<div class="mutation-tree">`;
            html += renderMutationTree(activePath, level);
            html += `</div>`;

            // Combat Record
            html += `<div class="section-header">Combat Record</div>`;
            html += `<div class="combat-record">`;
            if (fights.length === 0) {
                html += `<div class="no-fights">No combat data recorded.</div>`;
            } else {
                html += `
                <div class="combat-summary">
                    <div>
                        <div class="combat-stat-val">${fights.length}</div>
                        <div class="combat-stat-label">Total Fights</div>
                    </div>
                    <div>
                        <div class="combat-stat-val" style="color:var(--green);">${wins}</div>
                        <div class="combat-stat-label">Wins</div>
                    </div>
                    <div>
                        <div class="combat-stat-val" style="color:var(--accent);">${losses}</div>
                        <div class="combat-stat-label">Losses</div>
                    </div>
                </div>
                <div class="winrate-bar-bg">
                    <div class="winrate-bar-fill" style="width:${winRate}%"></div>
                </div>
                <div class="winrate-label">${winRate}% Win Rate</div>`;

                if (last5.length > 0) {
                    html += `<div class="fight-list-compact">`;
                    for (const f of last5) {
                        const won = f.result === 'win';
                        html += `
                        <div class="fight-compact">
                            <span class="fc-result ${won ? 'fc-win' : 'fc-loss'}">${won ? 'W' : 'L'}</span>
                            <span class="fc-opponent">${f.opponent || 'Unknown'}</span>
                            <span class="fc-ticks">${f.ticks != null ? f.ticks + 't' : ''}</span>
                        </div>`;
                    }
                    html += `</div>`;
                }
            }
            html += `</div>`;

            // Psychological Profile
            html += `<div class="section-header">Psychological Profile</div>`;
            html += `
            <div class="psych-profile">
                <div class="psych-mood">
                    <div class="psych-mood-label">Current Mood</div>
                    <div style="margin-top:0.3rem;font-size:1rem;">${getMoodDescription(pet.mood)}</div>
                </div>
                <div class="psych-soul-box" id="soulBox">
                    <span class="psych-stamp">EYES ONLY</span>
                    <span class="soul-cursor"></span>
                </div>
            </div>`;

            // Actions
            html += `
            <div class="dossier-actions">
                <button class="dossier-btn btn-share" id="shareBtn" onclick="copyDossier()">
                    &#128203; Copy Dossier Summary
                </button>
                <a href="/pets/home" class="dossier-btn btn-back">
                    &#8592; Return to Base
                </a>
            </div>`;

            el.innerHTML = html;

            // Fetch soul
            fetchSoul();
        }

        function getMoodDescription(mood) {
            const descriptions = {
                happy: '\u{1F600} Happy \u2014 morale high, ready for combat',
                angry: '\u{1F621} Angry \u2014 aggression elevated, caution advised',
                sad: '\u{1F614} Sad \u2014 withdrawn, combat efficacy reduced',
                neutral: '\u{1F610} Neutral \u2014 baseline emotional state',
                excited: '\u{1F929} Excited \u2014 elevated adrenaline, unpredictable',
                tired: '\u{1F634} Tired \u2014 fatigue detected, rest recommended',
                hungry: '\u{1F924} Hungry \u2014 seeking sustenance, irritable'
            };
            return descriptions[(mood || '').toLowerCase()] || ('\u{1F610} ' + capitalize(mood || 'Neutral') + ' \u2014 baseline emotional state');
        }

        function renderMutationTree(path, level) {
            let html = '';
            const t1Keys = ['bloodrage', 'thick_hide', 'quick_feet'];
            const hasT1 = path.t1 !== null;
            const hasT2 = path.t2 !== null;
            const hasT3 = path.t3 !== null;

            // Tier 1 — Level 3
            html += `<div class="tier-section">`;
            html += `<div class="tier-label">Tier I \u2014 Level 3</div>`;
            html += `<div class="tier-nodes">`;
            for (const k of t1Keys) {
                const node = MUTATION_TREE[k];
                let cls = 'mut-node';
                if (hasT1 && path.t1key === k) {
                    cls += ' chosen';
                } else if (hasT1) {
                    cls += ' unchosen';
                } else if (level < 3) {
                    cls += ' dimmed';
                }
                html += `<div class="${cls}">${node.name}</div>`;
            }
            html += `</div></div>`;

            // Connector
            html += `<div class="tier-connector"><div class="connector-line ${hasT1 ? 'active' : (level < 3 ? 'dimmed' : '')}"></div></div>`;

            // Tier 2 — Level 6
            html += `<div class="tier-section">`;
            html += `<div class="tier-label">Tier II \u2014 Level 6</div>`;
            html += `<div class="tier-nodes">`;
            if (hasT1 && MUTATION_TREE[path.t1key]) {
                const children = MUTATION_TREE[path.t1key].children;
                for (const [k2, t2] of Object.entries(children)) {
                    let cls = 'mut-node';
                    if (hasT2 && path.t2 === t2.name) {
                        cls += ' chosen';
                    } else if (hasT2) {
                        cls += ' unchosen';
                    } else if (level < 6) {
                        cls += ' dimmed';
                    }
                    html += `<div class="${cls}">${t2.name}</div>`;
                }
            } else {
                html += `<div class="mut-node dimmed">???</div>`;
                html += `<div class="mut-node dimmed">???</div>`;
            }
            html += `</div></div>`;

            // Connector
            html += `<div class="tier-connector"><div class="connector-line ${hasT2 ? 'active' : 'dimmed'}"></div></div>`;

            // Tier 3 — Level 9 (Destiny)
            html += `<div class="tier-section">`;
            html += `<div class="tier-label">Tier III \u2014 Level 9 \u2014 Destiny</div>`;
            html += `<div class="tier-nodes">`;
            if (hasT2 && MUTATION_TREE[path.t1key]) {
                const t2Children = MUTATION_TREE[path.t1key].children;
                for (const [k2, t2] of Object.entries(t2Children)) {
                    if (t2.name === path.t2 && t2.children) {
                        for (const [k3, t3] of Object.entries(t2.children)) {
                            let cls = 'mut-node';
                            if (hasT3 && path.t3 === t3.name) {
                                cls += ' chosen destiny';
                            } else if (level < 9) {
                                cls += ' dimmed';
                            }
                            html += `<div class="${cls}">${t3.name}</div>`;
                        }
                    }
                }
            } else {
                html += `<div class="mut-node dimmed">???</div>`;
            }
            html += `</div></div>`;

            return html;
        }

        function fetchSoul() {
            const box = document.getElementById('soulBox');
            if (!box) return;

            fetch('/api/v1/pets/soul', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pet: pet, context: 'idle' })
            })
            .then(r => r.json())
            .then(data => {
                const text = data.text || data.message || '';
                if (!text || text.includes('stares at you silently')) {
                    box.innerHTML = '<span class="psych-stamp">EYES ONLY</span>[REDACTED \u2014 CLEARANCE INSUFFICIENT]';
                    box.style.color = 'var(--text-muted)';
                } else {
                    box.innerHTML = '<span class="psych-stamp">EYES ONLY</span>';
                    typewriter(box, text);
                }
            })
            .catch(() => {
                box.innerHTML = '<span class="psych-stamp">EYES ONLY</span>[REDACTED \u2014 CLEARANCE INSUFFICIENT]';
                box.style.color = 'var(--text-muted)';
            });
        }

        function typewriter(el, text) {
            const stamp = el.querySelector('.psych-stamp');
            el.innerHTML = '';
            if (stamp) el.appendChild(stamp);
            let i = 0;
            const span = document.createElement('span');
            const cursor = document.createElement('span');
            cursor.className = 'soul-cursor';
            el.appendChild(span);
            el.appendChild(cursor);

            function tick() {
                if (i < text.length) {
                    span.textContent += text[i];
                    i++;
                    setTimeout(tick, 30);
                } else {
                    cursor.remove();
                }
            }
            tick();
        }

        function copyDossier() {
            const animal = capitalize(pet.animal || 'creature');
            const emoji = ANIMAL_EMOJIS[(pet.animal || '').toLowerCase()] || '\u{1F43E}';
            const mutations = (pet.mutations || []);
            const mutPath = mutations.length > 0 ? mutations.join(' > ') : 'None';
            const fights = pet.fights || [];
            const wins = fights.filter(f => f.result === 'win').length;
            const losses = fights.length - wins;

            const summary = `${emoji} My Moreau Pet: ${pet.name} the ${animal} | Level ${pet.level || 1} | ${mutPath} | W/L: ${wins}-${losses} | moreauarena.com/pets`;

            navigator.clipboard.writeText(summary).then(() => {
                const btn = document.getElementById('shareBtn');
                const orig = btn.innerHTML;
                btn.innerHTML = '&#10003; Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Init
        if (pet) {
            renderDossier();
        }
    </script>
</body>
</html>
